    function loadTodayData(dateStr) {
      try {
        const raw = localStorage.getItem(`shanigama:${dateStr}`);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function saveTodayData(dateStr, data) {
      try {
        localStorage.setItem(`shanigama:${dateStr}`, JSON.stringify(data));
      } catch (e) { console.error("save error", e); }
    }

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
    }

    function getDayOfWeek() { return new Date().getDay(); }
    function currentHour() { return new Date().getHours(); }

    function timeStr(ms) {
      if (!ms) return "";
      const d = new Date(ms);
      return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }

    function elapsedStr(startMs) {
      const ms = Date.now() - startMs;
      const m = Math.floor(ms / 60000);
      if (m < 60) return `${m}分`;
      return `${Math.floor(m/60)}時間${m%60}分`;
    }

    function remainingStr(startMs, estMin) {
      const elapsedMin = Math.floor((Date.now() - startMs) / 60000);
      const rem = estMin - elapsedMin;
      if (rem <= 0) return "超過中";
      return `残り${rem}分`;
    }

    function finishTimeStr(addMinutes) {
      const d = new Date(Date.now() + addMinutes * 60000);
      return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    }

    function generateTodayTasks(dow, overrides = {}) {
      return REPEAT_TASKS
        .filter(t => t.days.includes(dow))
        .map(t => {
          const ov = overrides[t.id] || {};
          return {
            id: `${todayStr()}_${t.id}`,
            repeatId: t.id,
            title: t.title,
            block: ov.block || t.block,
            cat: t.cat,
            est: ov.est != null ? ov.est : t.est,
            done: false,
            startTime: null,
            endTime: null,
            skipped: false,
          };
        });
    }

    // メインコンポーネント
    function Shanigama() {
      const [tasks, setTasks] = useState([]);
      const [activeTaskId, setActiveTaskId] = useState(null);
      const [loaded, setLoaded] = useState(false);
      const [now, setNow] = useState(new Date());
      const [selectedBlock, setSelectedBlock] = useState(null);
      const [addingTask, setAddingTask] = useState(false);
      const [newTaskTitle, setNewTaskTitle] = useState("");
      const [newTaskEst, setNewTaskEst] = useState(5);
      const [tab, setTab] = useState("today");
      const [overrides, setOverrides] = useState({});
      const [allDoneTime, setAllDoneTime] = useState(null);
      const [gcalClientId, setGcalClientId] = useState(() => localStorage.getItem("shanigama:gcal_client_id") || "");
      const [gcalSyncing, setGcalSyncing] = useState(false);
      const [gcalResult, setGcalResult] = useState(null);
      const [showGcalSetup, setShowGcalSetup] = useState(false);
      const [gcalClientIdInput, setGcalClientIdInput] = useState("");

      // Firebase
      const [fbUser, setFbUser] = useState(null);
      const [fbStatus, setFbStatus] = useState("disconnected"); // disconnected | connecting | synced | error
      const [showFbSetup, setShowFbSetup] = useState(false);
      const fbDbRef = useRef(null);
      const fbSaveTimerRef = useRef(null);

      const dateStr = todayStr();
      const dow = getDayOfWeek();
      const DOW_LABEL = ["日","月","火","水","木","金","土"];

      useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 30000);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        const ov = loadOverrides();
        setOverrides(ov);
        const saved = loadTodayData(dateStr);
        if (saved && saved.tasks) {
          setTasks(saved.tasks);
          setActiveTaskId(saved.activeTaskId || null);
          setAllDoneTime(saved.allDoneTime || null);
        } else {
          setTasks(generateTodayTasks(dow, ov));
        }
        setLoaded(true);
      }, []);

      useEffect(() => {
        if (!loaded) return;
        const data = { tasks, activeTaskId, allDoneTime };
        saveTodayData(dateStr, data);
        if (fbSaveTimerRef.current) clearTimeout(fbSaveTimerRef.current);
        fbSaveTimerRef.current = setTimeout(() => fbSaveDay(dateStr, data), 1500);
      }, [tasks, activeTaskId, allDoneTime, loaded]);

      useEffect(() => {
        if (!loaded) return;
        const total = tasks.filter(t => !t.skipped).length;
        const done = tasks.filter(t => t.done && !t.skipped).length;
        if (total > 0 && done === total && !allDoneTime) {
          setAllDoneTime(Date.now());
        }
      }, [tasks, loaded]);

      useEffect(() => {
        if (!loaded) return;
        const h = currentHour();
        const current = BLOCKS.find(b => h >= b.start && h < b.end);
        if (current && !selectedBlock) setSelectedBlock(current.id);
      }, [loaded]);

      function startTask(taskId) {
        const t = Date.now();
        if (activeTaskId && activeTaskId !== taskId) {
          setTasks(prev => prev.map(tk =>
            tk.id === activeTaskId ? { ...tk, done: true, endTime: t } : tk
          ));
        }
        setTasks(prev => prev.map(tk =>
          tk.id === taskId ? { ...tk, startTime: t, endTime: null, done: false } : tk
        ));
        setActiveTaskId(taskId);
      }

      function completeTask(taskId) {
        const t = Date.now();
        setTasks(prev => prev.map(tk =>
          tk.id === taskId ? { ...tk, done: true, endTime: tk.endTime || t } : tk
        ));
        if (activeTaskId === taskId) setActiveTaskId(null);
      }

      function skipTask(taskId) {
        setTasks(prev => prev.map(tk =>
          tk.id === taskId ? { ...tk, skipped: true, done: true } : tk
        ));
        if (activeTaskId === taskId) setActiveTaskId(null);
      }

      function undoTask(taskId) {
        setTasks(prev => prev.map(tk =>
          tk.id === taskId
            ? { ...tk, done: false, skipped: false, startTime: null, endTime: null }
            : tk
        ));
      }

      function addTask() {
        if (!newTaskTitle.trim() || !selectedBlock) return;
        const newTask = {
          id: `${dateStr}_custom_${Date.now()}`,
          repeatId: null,
          title: newTaskTitle.trim(),
          block: selectedBlock,
          cat: "その他",
          est: newTaskEst,
          done: false,
          startTime: null,
          endTime: null,
          skipped: false,
        };
        setTasks(prev => [...prev, newTask]);
        setNewTaskTitle("");
        setNewTaskEst(5);
        setAddingTask(false);
      }

      // ── Firebase ─────────────────────────────────────
      function fbUserDoc(path) {
        if (!fbDbRef.current || !fbUser) return null;
        return fbDbRef.current.collection("users").doc(fbUser.uid).collection(path[0]).doc(path[1]);
      }

      async function fbLoadDay(dateStr) {
        const ref = fbUserDoc(["days", dateStr]);
        if (!ref) return null;
        const snap = await ref.get();
        return snap.exists ? snap.data() : null;
      }

      async function fbLoadOv() {
        const ref = fbUserDoc(["settings", "overrides"]);
        if (!ref) return null;
        const snap = await ref.get();
        return snap.exists ? (snap.data().overrides || null) : null;
      }

      function fbSaveDay(dateStr, data) {
        const ref = fbUserDoc(["days", dateStr]);
        if (!ref) return;
        ref.set(data).catch(e => console.error("fb save day", e));
      }

      function fbSaveOv(ov) {
        const ref = fbUserDoc(["settings", "overrides"]);
        if (!ref) return;
        ref.set({ overrides: ov }).catch(e => console.error("fb save ov", e));
      }

      // Firebase 初期化（起動時に自動実行）
      useEffect(() => {
        try {
          let app;
          try { app = firebase.app("shanigama"); }
          catch { app = firebase.initializeApp(FIREBASE_CONFIG, "shanigama"); }
          fbDbRef.current = firebase.firestore(app);
          const auth = firebase.auth(app);
          setFbStatus("connecting");
          auth.onAuthStateChanged(user => {
            if (user) {
              setFbUser(user);
              setFbStatus("synced");
            } else {
              auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
                .catch(e => setFbStatus("error:" + e.code));
            }
          });
        } catch(e) {
          setFbStatus("error:" + e.message);
        }
      }, []);

      // ログイン後に Firebase からデータを取得してローカルを上書き
      useEffect(() => {
        if (!fbUser) return;
        (async () => {
          try {
            const [fbOv, fbDay] = await Promise.all([fbLoadOv(), fbLoadDay(dateStr)]);
            if (fbOv) { setOverrides(fbOv); saveOverrides(fbOv); }
            if (fbDay && fbDay.tasks) {
              setTasks(fbDay.tasks);
              setActiveTaskId(fbDay.activeTaskId || null);
              setAllDoneTime(fbDay.allDoneTime || null);
              saveTodayData(dateStr, fbDay);
            }
          } catch(e) { console.error("fb initial load", e); }
        })();
      }, [fbUser]);

      // ─────────────────────────────────────────────────

      // ── Google Calendar ──────────────────────────────
      async function fetchTodayCalendarEvents(accessToken) {
        const d = new Date();
        const timeMin = new Date(d.getFullYear(), d.getMonth(), d.getDate()).toISOString();
        const timeMax = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 23, 59, 59).toISOString();
        const url = new URL("https://www.googleapis.com/calendar/v3/calendars/primary/events");
        url.searchParams.set("timeMin", timeMin);
        url.searchParams.set("timeMax", timeMax);
        url.searchParams.set("singleEvents", "true");
        url.searchParams.set("orderBy", "startTime");
        const res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
        if (!res.ok) throw new Error(`Calendar API ${res.status}`);
        const data = await res.json();
        return data.items || [];
      }

      function calendarEventToTask(event) {
        const startStr = event.start?.dateTime;
        const endStr = event.end?.dateTime;
        if (!startStr) return null; // 終日イベントはスキップ
        const start = new Date(startStr);
        const end = endStr ? new Date(endStr) : null;
        const startHour = start.getHours() + start.getMinutes() / 60;
        const block = BLOCKS.find(b => startHour >= b.start && startHour < b.end);
        if (!block) return null;
        const estMin = end ? Math.max(1, Math.round((end - start) / 60000)) : 30;
        return {
          id: `gcal_${event.id}_${todayStr()}`,
          repeatId: null,
          title: `📅 ${event.summary || "(タイトルなし)"}`,
          block: block.id,
          cat: "その他",
          est: estMin,
          done: false,
          startTime: null,
          endTime: null,
          skipped: false,
          gcalEventId: event.id,
        };
      }

      function handleGcalSync(clientIdOverride) {
        const id = clientIdOverride || gcalClientId;
        if (!id) { setGcalClientIdInput(""); setShowGcalSetup(true); return; }
        if (!window.google?.accounts?.oauth2) {
          setGcalResult({ error: "Google APIが読み込まれていません。リロードしてください。" });
          return;
        }
        setGcalSyncing(true);
        setGcalResult(null);
        window.google.accounts.oauth2.initTokenClient({
          client_id: id,
          scope: "https://www.googleapis.com/auth/calendar.readonly",
          callback: async (response) => {
            if (response.error) {
              setGcalResult({ error: response.error });
              setGcalSyncing(false);
              return;
            }
            try {
              const events = await fetchTodayCalendarEvents(response.access_token);
              const newTasks = events.map(calendarEventToTask).filter(Boolean);
              setTasks(prev => {
                const existingIds = new Set(prev.filter(t => t.gcalEventId).map(t => t.gcalEventId));
                const toAdd = newTasks.filter(t => !existingIds.has(t.gcalEventId));
                return [...prev, ...toAdd];
              });
              setGcalResult({ count: newTasks.length });
            } catch(e) {
              setGcalResult({ error: e.message });
            }
            setGcalSyncing(false);
          },
        }).requestAccessToken();
      }

      function saveGcalClientId() {
        const id = gcalClientIdInput.trim();
        if (!id) return;
        localStorage.setItem("shanigama:gcal_client_id", id);
        setGcalClientId(id);
        setShowGcalSetup(false);
        handleGcalSync(id);
      }
      // ─────────────────────────────────────────────────

      const blockTasks = (blockId) =>
        tasks.filter(t => t.block === blockId && !t.skipped);

      const doneCount = tasks.filter(t => t.done && !t.skipped).length;
      const totalCount = tasks.filter(t => !t.skipped).length;
      const progress = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;
      const activeTask = tasks.find(t => t.id === activeTaskId);
      const h = now.getHours();
      const currentBlock = BLOCKS.find(b => h >= b.start && h < b.end);

      if (!loaded) {
        return (
          <div style={styles.loading}>
            <div style={styles.loadingText}>しゃにがま 起動中...</div>
          </div>
        );
      }

      return (
        <div style={styles.root}>
          <div style={styles.header}>
            <div style={styles.headerLeft}>
              <div style={{display:"flex", alignItems:"center", gap:8}}>
                <div style={styles.appName}>しゃにがま</div>
                {allDoneTime && (
                  <div style={styles.allDoneBadge}>全完了 {timeStr(allDoneTime)}</div>
                )}
              </div>
              <div style={styles.dateLabel}>
                {now.getFullYear()}/{now.getMonth()+1}/{now.getDate()}（{DOW_LABEL[dow]}）
                {"　"}
                {String(now.getHours()).padStart(2,"0")}:{String(now.getMinutes()).padStart(2,"0")}
              </div>
            </div>
            <div style={styles.headerRight}>
              <button
                style={{...styles.gcalBtn, ...(fbStatus==="synced" ? styles.fbBtnSynced : fbStatus.startsWith("error") ? styles.fbBtnError : {})}}
                onClick={() => { if (!fbConfig) { setFbConfigInput(""); setShowFbSetup(true); } else setShowFbSetup(true); }}
                title={fbStatus === "synced" ? `同期中: ${fbUser?.displayName || fbUser?.email}` : fbStatus === "connecting" ? "接続中..." : "Firebaseを設定"}
              >
                {fbStatus === "synced" ? "🔥" : fbStatus === "connecting" ? "⏳" : "☁️"}
              </button>
              <button
                style={styles.gcalBtn}
                onClick={() => handleGcalSync()}
                disabled={gcalSyncing}
                title="Googleカレンダー同期"
              >
                {gcalSyncing ? "⏳" : "📅"}
              </button>
              <div style={styles.progressCircle}>
                <svg width="56" height="56" viewBox="0 0 56 56">
                  <circle cx="28" cy="28" r="24" fill="none" stroke="#1e293b" strokeWidth="4"/>
                  <circle cx="28" cy="28" r="24" fill="none" stroke="#38bdf8" strokeWidth="4"
                    strokeDasharray={`${2*Math.PI*24}`}
                    strokeDashoffset={`${2*Math.PI*24*(1-progress/100)}`}
                    strokeLinecap="round"
                    transform="rotate(-90 28 28)"
                    style={{transition:"stroke-dashoffset 0.5s"}}
                  />
                  <text x="28" y="33" textAnchor="middle" fill="#e2e8f0" fontSize="13" fontWeight="bold">
                    {progress}%
                  </text>
                </svg>
              </div>
              <div style={styles.countLabel}>{doneCount}/{totalCount}</div>
            </div>
          </div>

          {/* タブナビ */}
          <div style={styles.tabNav}>
            <button
              style={{...styles.tabBtn, ...(tab==="today" ? styles.tabBtnActive : {})}}
              onClick={() => setTab("today")}
            >今日</button>
            <button
              style={{...styles.tabBtn, ...(tab==="edit" ? styles.tabBtnActive : {})}}
              onClick={() => setTab("edit")}
            >タスク編集</button>
          </div>

          {gcalResult && (
            <div style={{...styles.gcalResultBar, ...(gcalResult.error ? styles.gcalResultError : styles.gcalResultOk)}}>
              {gcalResult.error
                ? `❌ ${gcalResult.error}`
                : `✅ Googleカレンダーから ${gcalResult.count} 件の予定を追加しました`}
              <button style={styles.gcalResultClose} onClick={() => setGcalResult(null)}>×</button>
            </div>
          )}

          {showGcalSetup && (
            <div style={styles.gcalOverlay}>
              <div style={styles.gcalModal}>
                <div style={styles.gcalModalTitle}>📅 Googleカレンダー連携設定</div>
                <div style={styles.gcalModalSection}>
                  <div style={styles.gcalModalStep}>① <a href="https://console.cloud.google.com/" target="_blank" style={styles.gcalLink}>Google Cloud Console</a> でプロジェクトを作成</div>
                  <div style={styles.gcalModalStep}>② 「APIとサービス」→「ライブラリ」で <b>Google Calendar API</b> を有効化</div>
                  <div style={styles.gcalModalStep}>③ 「認証情報」→「OAuthクライアントID作成」→ アプリの種類：<b>ウェブアプリケーション</b></div>
                  <div style={styles.gcalModalStep}>④ 承認済みのJavaScriptオリジンに追加：</div>
                  <div style={styles.gcalModalCode}>https://toytoysheep.github.io</div>
                  <div style={styles.gcalModalStep}>⑤ 作成されたクライアントIDを以下に貼り付け</div>
                </div>
                <input
                  style={styles.gcalInput}
                  placeholder="クライアントID（〜.apps.googleusercontent.com）"
                  value={gcalClientIdInput}
                  onChange={e => setGcalClientIdInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && saveGcalClientId()}
                  autoFocus
                />
                {gcalClientId && (
                  <div style={styles.gcalCurrentId}>現在: {gcalClientId.slice(0, 30)}…</div>
                )}
                <div style={styles.gcalModalBtns}>
                  <button style={styles.addConfirmBtn} onClick={saveGcalClientId}>保存して同期</button>
                  <button style={styles.addCancelBtn} onClick={() => setShowGcalSetup(false)}>キャンセル</button>
                </div>
              </div>
            </div>
          )}

          {showFbSetup && (
            <div style={styles.gcalOverlay}>
              <div style={styles.gcalModal}>
                <div style={styles.gcalModalTitle}>🔥 Firebase 同期ステータス</div>
                {fbStatus === "synced" ? (
                  <div style={{...styles.gcalModalStep, color:"#34d399", marginBottom:12}}>
                    ✅ 同期中<br/>{fbUser?.displayName || fbUser?.email}
                  </div>
                ) : fbStatus === "connecting" ? (
                  <div style={{...styles.gcalModalStep, color:"#fbbf24", marginBottom:12}}>
                    ⏳ 接続中...
                  </div>
                ) : (
                  <div style={{...styles.gcalModalStep, color:"#f87171", marginBottom:12}}>
                    ❌ {fbStatus}
                  </div>
                )}
                <div style={styles.gcalModalBtns}>
                  <button style={styles.addCancelBtn} onClick={() => setShowFbSetup(false)}>閉じる</button>
                </div>
              </div>
            </div>
          )}

          {tab === "edit" && (
            <EditTab overrides={overrides} onChangeOverride={(id, field, val) => {
              const next = { ...overrides, [id]: { ...(overrides[id] || {}), [field]: val } };
              setOverrides(next);
              saveOverrides(next);
              fbSaveOv(next);
            }} />
          )}

          {tab === "today" && activeTask && (
            <div style={styles.activeBar}>
              <div style={styles.activeIcon}>▶</div>
              <div style={styles.activeInfo}>
                <div style={styles.activeTitle}>{activeTask.title}</div>
                <div style={styles.activeTime}>
                  {timeStr(activeTask.startTime)} 〜 {elapsedStr(activeTask.startTime)} 経過
                  {"　"}
                  <span style={{color: (() => { const rem = activeTask.est - Math.floor((now - activeTask.startTime) / 60000); return rem <= 0 ? "#fb923c" : "#34d399"; })()}}>
                    {remainingStr(activeTask.startTime, activeTask.est)}
                  </span>
                  {"　"}
                  <span style={{color:"#94a3b8"}}>
                    終了見込 {finishTimeStr(Math.max(0, activeTask.est - Math.floor((now - activeTask.startTime) / 60000)))}
                  </span>
                </div>
              </div>
              <button style={styles.activeDoneBtn} onClick={() => completeTask(activeTask.id)}>
                完了
              </button>
            </div>
          )}

          {tab === "today" && <div style={styles.blockNav}>
            {BLOCKS.map(b => {
              const btasks = blockTasks(b.id);
              const bdone = btasks.filter(t=>t.done).length;
              const isCurrent = currentBlock && currentBlock.id === b.id;
              const isSelected = selectedBlock === b.id;
              return (
                <button
                  key={b.id}
                  style={{
                    ...styles.blockNavBtn,
                    ...(isSelected ? styles.blockNavBtnActive : {}),
                    ...(isCurrent ? styles.blockNavBtnCurrent : {}),
                  }}
                  onClick={() => setSelectedBlock(b.id)}
                >
                  <div style={styles.blockNavLabel}>{b.label}</div>
                  <div style={styles.blockNavCount}>{bdone}/{btasks.length}</div>
                </button>
              );
            })}
          </div>}

          {tab === "today" && selectedBlock && (() => {
            const block = BLOCKS.find(b => b.id === selectedBlock);
            const btasks = blockTasks(selectedBlock);
            const skipped = tasks.filter(t => t.block === selectedBlock && t.skipped);
            const remainingEstMin = btasks
              .filter(t => !t.done)
              .reduce((sum, t) => {
                if (t.id === activeTaskId && t.startTime) {
                  const rem = t.est - Math.floor((now - t.startTime) / 60000);
                  return sum + Math.max(0, rem);
                }
                return sum + t.est;
              }, 0);
            return (
              <div style={styles.blockDetail}>
                <div style={styles.blockDetailHeader}>
                  <div>
                    <div style={styles.blockDetailTitle}>
                      {block.label}　{block.title}
                    </div>
                    <div style={styles.blockDetailSub}>
                      {btasks.filter(t=>t.done).length}/{btasks.length} 完了
                      {btasks.filter(t=>!t.done).length > 0 && (
                        <span style={{marginLeft:8, color:"#38bdf8"}}>
                          終了見込 {finishTimeStr(remainingEstMin)}
                        </span>
                      )}
                    </div>
                  </div>
                  <button style={styles.addBtn} onClick={() => setAddingTask(true)}>
                    ＋ タスク追加
                  </button>
                </div>

                {addingTask && (
                  <div style={styles.addForm}>
                    <input
                      style={styles.addInput}
                      placeholder="タスク名"
                      value={newTaskTitle}
                      onChange={e => setNewTaskTitle(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && addTask()}
                      autoFocus
                    />
                    <div style={styles.addFormRow}>
                      <input
                        style={styles.addEstInput}
                        type="number"
                        value={newTaskEst}
                        min={1} max={180}
                        onChange={e => setNewTaskEst(Number(e.target.value))}
                      />
                      <span style={styles.addEstLabel}>分</span>
                      <button style={styles.addConfirmBtn} onClick={addTask}>追加</button>
                      <button style={styles.addCancelBtn} onClick={() => setAddingTask(false)}>キャンセル</button>
                    </div>
                  </div>
                )}

                {btasks.length === 0 && (
                  <div style={styles.emptyBlock}>今日このブロックにタスクはありません</div>
                )}
                {btasks.map(task => (
                  <TaskRow
                    key={task.id}
                    task={task}
                    isActive={task.id === activeTaskId}
                    onStart={() => startTask(task.id)}
                    onComplete={() => completeTask(task.id)}
                    onSkip={() => skipTask(task.id)}
                    onUndo={() => undoTask(task.id)}
                  />
                ))}

                {skipped.length > 0 && (
                  <div style={styles.skippedSection}>
                    <div style={styles.skippedLabel}>スキップ ({skipped.length})</div>
                    {skipped.map(task => (
                      <div key={task.id} style={styles.skippedRow}>
                        <span style={styles.skippedTitle}>{task.title}</span>
                        <button style={styles.undoBtn} onClick={() => undoTask(task.id)}>戻す</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      );
    }

    // リピートタスク編集タブ
    function EditTab({ overrides, onChangeOverride }) {
      const grouped = BLOCKS.map(b => ({
        block: b,
        tasks: REPEAT_TASKS.filter(t => {
          const ov = overrides[t.id];
          return (ov && ov.block ? ov.block : t.block) === b.id;
        }),
      })).filter(g => g.tasks.length > 0);

      return (
        <div style={styles.editTab}>
          <div style={styles.editNote}>※ 変更は翌日のタスク生成から反映されます</div>
          {grouped.map(({ block, tasks }) => (
            <div key={block.id} style={styles.editGroup}>
              <div style={styles.editGroupTitle}>{block.label}　{block.title}</div>
              {tasks.map(t => {
                const ov = overrides[t.id] || {};
                const curBlock = ov.block || t.block;
                const curEst = ov.est != null ? ov.est : t.est;
                return (
                  <div key={t.id} style={styles.editRow}>
                    <div style={styles.editTaskTitle}>{t.title}</div>
                    <div style={styles.editControls}>
                      <select
                        style={styles.editSelect}
                        value={curBlock}
                        onChange={e => onChangeOverride(t.id, "block", e.target.value)}
                      >
                        {BLOCKS.map(b => (
                          <option key={b.id} value={b.id}>{b.label}</option>
                        ))}
                      </select>
                      <input
                        style={styles.editEstInput}
                        type="number"
                        min={1} max={180}
                        value={curEst}
                        onChange={e => onChangeOverride(t.id, "est", Number(e.target.value))}
                      />
                      <span style={styles.addEstLabel}>分</span>
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      );
    }

    // タスク行コンポーネント
    function TaskRow({ task, isActive, onStart, onComplete, onSkip, onUndo }) {
      const catColor = CAT_COLOR[task.cat] || CAT_COLOR["その他"];

      if (task.done && !task.skipped) {
        return (
          <div style={styles.taskRowDone}>
            <div style={{...styles.catDot, background: catColor}} />
            <div style={styles.taskDoneInfo}>
              <span style={styles.taskDoneTitle}>{task.title}</span>
              <span style={styles.taskDoneTime}>
                {task.startTime ? `${timeStr(task.startTime)}〜${timeStr(task.endTime)}` : "完了"}
              </span>
            </div>
            <button style={styles.undoBtn} onClick={onUndo}>↩</button>
          </div>
        );
      }

      return (
        <div style={{
          ...styles.taskRow,
          ...(isActive ? styles.taskRowActive : {}),
        }}>
          <div style={{...styles.catDot, background: catColor}} />
          <div style={styles.taskInfo}>
            <div style={styles.taskTitle}>{task.title}</div>
            <div style={styles.taskMeta}>
              <span style={styles.catTag}>{task.cat}</span>
              <span style={styles.estTag}>{task.est}分</span>
              {isActive && task.startTime && (
                <span style={styles.runningTag}>実行中 {timeStr(task.startTime)}〜</span>
              )}
            </div>
          </div>
          <div style={styles.taskActions}>
            {!isActive && (
              <button style={styles.startBtn} onClick={onStart}>▶</button>
            )}
            {isActive && (
              <button style={styles.completeBtn} onClick={onComplete}>✓</button>
            )}
            <button style={styles.skipBtn} onClick={onSkip}>—</button>
          </div>
        </div>
      );
    }
